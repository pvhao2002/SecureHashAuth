<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecureHashAuth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--one" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--two" aria-hidden="true"></div>

  <header class="site-header">
    <a href="/" class="brand">
      <span class="brand__mark">◇</span>
      <span class="brand__text">SecureHashAuth</span>
    </a>
    <nav class="nav">
      <a href="/team" class="nav__link">Nhóm thực hiện</a>
      {% if user %}
        <a href="/dashboard" class="nav__link">Bảng điều khiển</a>
        <a href="/logout" class="nav__link nav__link--muted">Đăng xuất</a>
      {% else %}
        <span class="nav__hint">Băm Bcrypt · Scrypt · Argon2</span>
      {% endif %}
    </nav>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Khóa luận ATTT — chỉ lưu chuỗi băm; không lưu mật khẩu dạng plaintext.</p>
  </footer>
</body>
</html>
